name: Run tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: 'branch or tag'
        required: false
        default: 'master'

jobs:
  test-project:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'gradle'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: gradle/actions/setup-gradle@v5

      - name: Show branch info
        run: |
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF}"
          echo "GITHUB_BASE_REF=${GITHUB_BASE_REF}"
          echo "workflow_dispatch ref input=${{ github.event.inputs.ref }}"

      - name: Detect changed modules
        id: changed
        run: |
          echo "Fetching base branch for diff..."

          # Ensure we have a common history for diff.
          git fetch --no-tags --prune origin "+refs/heads/*:refs/remotes/origin/*"
          git fetch --no-tags --prune origin "+refs/pull/*/head:refs/remotes/origin/pr/*" || true
          git fetch --no-tags --prune --unshallow origin || true

          if [ -n "${GITHUB_BASE_REF}" ]; then
            base_ref=${GITHUB_BASE_REF}
          else
            # For manual dispatch and non-PR triggers, use previous commit as base if available.
            base_ref=HEAD~1
          fi
          echo "Base ref=$base_ref"

          # If base_ref is branch name, map to origin ref for compare.
          if [ "$base_ref" != "HEAD~1" ]; then
            if git show-ref --verify --quiet refs/remotes/origin/$base_ref; then
              compare_ref=origin/$base_ref
            else
              compare_ref=$base_ref
            fi
          else
            compare_ref=$base_ref
          fi

          changed_files=$(git diff --name-only $compare_ref...HEAD || true)
          if [ -z "$changed_files" ]; then
            echo "No changed files detected from diff; fallback to full test run."
          else
            echo "Changed files:\n$changed_files"
          fi

          modules=()
          for module in base core deep json kotlin nlp plot scala serve spark studio website; do
            if echo "$changed_files" | grep -q "^${module}/"; then
              modules+=(":${module}:test")
            fi
          done

          if [ ${#modules[@]} -eq 0 ]; then
            echo "No module-specific changes detected. Running full test suite."
            echo "modules=test" >> $GITHUB_OUTPUT
          else
            module_tasks=$(IFS=","; echo "${modules[*]}")
            echo "Detected modules: $module_tasks"
            echo "modules=$module_tasks" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: |
          module_tasks="${{ steps.changed.outputs.modules }}"
          if [ "$module_tasks" = "test" ]; then
            ./gradlew test
          else
            echo "Running selected modules: $module_tasks"
            ./gradlew $module_tasks
          fi

